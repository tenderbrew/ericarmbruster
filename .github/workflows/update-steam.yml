# Runs steam-fetch.js daily, commits updated JSON back to the repo.
name: Update Steam Data

on:
  schedule:
    - cron: '0 8 * * *' # Daily at 08:00 UTC (3 AM Eastern)
  workflow_dispatch: # Manual trigger from Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Secrets injected from GitHub repo settings.
      - name: Fetch Steam data
        env:
          STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
          STEAM_ID: ${{ secrets.STEAM_ID }}
        run: node steam-fetch.js

      # Skip commit if nothing changed.
      - name: Commit and push if changed
        run: |
          git diff --quiet steam-data.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add steam-data.json
          git commit -m "chore: update steam data"
          git push
