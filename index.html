<!--
  index.html — Homepage (Tufte-warm, book-spine shelf)
  ----------------------------------------------------
  A small personal-magazine masthead with a hand-styled bookshelf for the
  table of contents: each section is a unique book spine in its own cloth
  color, varied height and width, with gold-foil bands and an italic
  vertical title. The "interesting design element" is the shelf itself —
  pure CSS, no scroll trickery.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Eric Armbruster</title>

  <meta name="description" content="Personal site of Eric M. Armbruster — film, video games, economics, self-hosting, and the dogs along the way.">
  <meta name="theme-color" content="#fbf6e8">
  <link rel="canonical" href="https://www.ericarmbruster.com/">
  <meta property="og:title" content="Eric Armbruster">
  <meta property="og:description" content="Personal site of Eric M. Armbruster covering film, video games, economics, self-hosting, and Bitcoin.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.ericarmbruster.com/">
  <meta property="og:image" content="https://www.ericarmbruster.com/images/hector-0002.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Eric Armbruster">
  <meta name="twitter:description" content="Personal site of Eric M. Armbruster.">
  <meta name="twitter:image" content="https://www.ericarmbruster.com/images/hector-0002.png">

  <link rel="icon" href="images/hector-favicon.png" type="image/png">

  <!-- EB Garamond is the warm humanist serif body. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/tufte-base.css">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-5ZTHJXDR9V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-5ZTHJXDR9V');
  </script>

  <style>
    /* ── MASTHEAD ─────────────────────────────────────────────────────── */
    .masthead {
      max-width: var(--container);
      margin: 0 auto;
      padding: var(--space-8) var(--gutter) var(--space-6);
      border-bottom: 1px solid var(--rule);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: var(--space-7);
      align-items: center;
    }
    .masthead-title {
      font-family: var(--font-serif);
      font-size: var(--fs-display);
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.005em;
      margin: 0;
    }
    .masthead-tagline {
      margin-top: var(--space-4);
      font-style: italic;
      color: var(--ink-2);
      font-size: 1.3rem;
      max-width: 38rem;
      line-height: 1.4;
    }
    .masthead-tagline em { color: var(--accent-red); font-style: italic; }
    .masthead-meta {
      margin-top: var(--space-5);
      font-size: var(--fs-small);
      color: var(--ink-3);
      font-variant: small-caps;
      letter-spacing: 0.08em;
    }
    .masthead-meta span { color: var(--ink-2); }

    /* Hector portrait — tipped-in frontispiece beside the masthead text. */
    .masthead-portrait {
      position: relative;
      margin: 0;
      padding: 10px 10px 12px;
      background: #fcf6e2;
      border: 1px solid var(--rule);
      box-shadow:
        0 8px 22px -8px rgba(28, 22, 17, 0.4),
        0 2px 5px -2px rgba(28, 22, 17, 0.2);
      transform: rotate(-1.2deg);
      align-self: center;
    }
    .masthead-portrait img {
      display: block;
      width: 19rem;
      height: 19rem;
      object-fit: cover;
      object-position: 50% 22%;
      filter: sepia(0.1) saturate(0.95);
    }
    .masthead-portrait::before, .masthead-portrait::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      background: rgba(40, 30, 20, 0.55);
      pointer-events: none;
      z-index: 2;
    }
    .masthead-portrait::before { top: 0; left: 0; clip-path: polygon(0 0, 100% 0, 0 100%); }
    .masthead-portrait::after  { top: 0; right: 0; clip-path: polygon(0 0, 100% 0, 100% 100%); }
    .masthead-portrait-caption {
      display: block;
      margin-top: 8px;
      text-align: center;
      font-family: var(--font-serif);
      font-style: italic;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--ink);
      line-height: 1.2;
    }

    .shelf-eyebrow {
      max-width: var(--container);
      margin: var(--space-7) auto var(--space-4);
      padding: 0 var(--gutter);
      font-style: italic;
      color: var(--ink-3);
      font-size: 1rem;
    }

    /* ── SHELF ───────────────────────────────────────────────────────── */
    .shelf {
      max-width: var(--container);
      margin: 0 auto;
      padding: 0 var(--gutter);
    }
    .shelf-row {
      display: flex;
      gap: 6px;
      align-items: flex-end;
      padding-bottom: var(--space-2);
      border-bottom: 6px solid #4a3a26;
      box-shadow: 0 1px 0 #2a1f12, 0 8px 16px -10px rgba(28,22,17,0.25);
      flex-wrap: wrap;
      row-gap: var(--space-5);
    }

    /* Each book — uses --book-color for the cloth tone, --book-h/--book-w
       for the unique height/width per section. */
    .shelf-book {
      position: relative;
      width: var(--book-w, 5.5rem);
      height: var(--book-h, 18rem);
      background-color: var(--book-color, var(--c-vg));
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(0,0,0,0.05) 30%, rgba(0,0,0,0.22) 100%),
        repeating-linear-gradient(180deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 4px);
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      box-shadow:
        inset 1px 0 0 rgba(255,255,255,0.08),
        inset -1px 0 0 rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -1px 0 rgba(0,0,0,0.25),
        2px 2px 6px -2px rgba(28,22,17,0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      text-decoration: none;
      color: rgba(245, 233, 200, 0.95);
      transition: transform 200ms ease, box-shadow 200ms ease;
      flex: 0 0 auto;
    }
    .shelf-book:hover {
      transform: translateY(-6px);
      background-image:
        linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(0,0,0,0.04) 30%, rgba(0,0,0,0.20) 100%),
        repeating-linear-gradient(180deg, rgba(0,0,0,0.05) 0 1px, transparent 1px 4px);
      box-shadow:
        inset 1px 0 0 rgba(255,255,255,0.10),
        inset -1px 0 0 rgba(0,0,0,0.18),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -1px 0 rgba(0,0,0,0.25),
        4px 8px 14px -4px rgba(28,22,17,0.35);
      color: rgba(245, 233, 200, 1);
    }

    /* Top and bottom gold-foil bands. */
    .shelf-book::before,
    .shelf-book::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(180deg, #d4b56f, #8a6a30, #d4b56f);
      opacity: 0.85;
    }
    .shelf-book::before { top: 0.6rem; }
    .shelf-book::after  { bottom: 0.6rem; }

    .shelf-book-glyph {
      font-family: var(--font-serif);
      font-size: 1rem;
      color: rgba(245, 233, 200, 0.7);
      line-height: 1;
      margin-top: 0.4rem;
      margin-bottom: 1rem;       /* breathing room above the bottom gold band */
      height: 1.4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 200ms ease;
    }
    .shelf-book-glyph svg {
      width: 18px;
      height: 18px;
      display: block;
      overflow: visible;
    }
    .shelf-book-glyph svg.glyph-wide { width: 22px; height: 11px; }
    .shelf-book:hover .shelf-book-glyph { color: rgba(245, 233, 200, 0.95); }
    .shelf-book-title {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 1.1rem;
      font-weight: 500;
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: 0.02em;
      white-space: nowrap;
      color: inherit;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;   /* center the vertical text along the spine */
      padding: 0.4rem 0;
    }
    .shelf-book-no {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: 0.95rem;
      color: rgba(245, 233, 200, 0.55);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    /* Per-book unique color, height, width — the charm of a real shelf. */
    .shelf-book--vg      { --book-color: var(--c-vg);      --book-h: 20rem;   --book-w: 5.5rem; }
    .shelf-book--film    { --book-color: var(--c-film);    --book-h: 17.5rem; --book-w: 5rem;   }
    .shelf-book--econ    { --book-color: var(--c-econ);    --book-h: 21.5rem; --book-w: 6rem;   }
    .shelf-book--sh      { --book-color: var(--c-sh);      --book-h: 16.5rem; --book-w: 4.5rem; }
    .shelf-book--bitcoin { --book-color: var(--c-bitcoin); --book-h: 19rem;   --book-w: 5rem;   }
    .shelf-book--seymour { --book-color: var(--c-seymour); --book-h: 17rem;   --book-w: 4.5rem; }

    .shelf-caption {
      max-width: var(--container);
      margin: var(--space-5) auto 0;
      padding: 0 var(--gutter);
      font-style: italic;
      color: var(--ink-3);
      font-size: 1rem;
    }
    .shelf-caption em { color: var(--accent-red); }

    /* Footer social links — sit on the right of the footer. */
    .footer-links {
      display: flex;
      gap: var(--space-5);
      flex-wrap: wrap;
    }
    .footer-links a {
      background: none;
      padding: 0;
    }

    @media (max-width: 640px) {
      .masthead {
        grid-template-columns: 1fr;
        text-align: center;
        gap: var(--space-5);
      }
      .masthead-tagline { margin-left: auto; margin-right: auto; }
      .masthead-title { font-size: 2.4rem; }
      .masthead-tagline { font-size: 1.1rem; }
      .masthead-portrait { justify-self: center; transform: rotate(-1deg); }
      .masthead-portrait img { width: 15rem; height: 15rem; }
      .shelf-row { gap: 4px; }
      .shelf-book { transform: scale(0.85); transform-origin: bottom center; }
    }
  </style>
</head>

<body>
